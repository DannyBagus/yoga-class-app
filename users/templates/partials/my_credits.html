<div
  class="text-white"
  x-data="{ purchaseCredits: false }"
>
  <!-- Credits content -->
  <div
    id="credits"
    class="flex justify-between bg-white rounded-lg p-4 md:p-8 items-center min-w-[90%] md:min-w-[70%]"
  >
    <p class="text-lg md:text-2xl text-black">Dein Credits Guthaben</p>
    <div
      class="flex items-center justify-center bg-[#e46aeb] px-8 py-2 md:py-4 text-xl md:text-3xl rounded-lg"
    >
      {{ credits }}
    </div>
  </div>
  <div class="flex items-center justify-center m-4 md:m-8">
    <button
      class="bg-[#00df9a] rounded-xl p-4 md:p-8 mt-8 md:mt-16 text-sm md:text-xl"
      @click="purchaseCredits = true"
    >
      Jetzt kaufen
    </button>
  </div>

  <div id="transaction-history">
    {% include 'partials/transaction_history.html' %}
  </div>

  <!-- Backdrop -->
  <div
    x-show="purchaseCredits"
    x-transition:enter="transition ease-out duration-200"
    x-transition:enter-start="opacity-0"
    x-transition:enter-end="opacity-100"
    x-transition:leave="transition ease-in duration-150"
    x-transition:leave-start="opacity-100"
    x-transition:leave-end="opacity-0"
    class="fixed inset-0 bg-black/60 z-40"
    @click="purchaseCredits = false"
  ></div>

  <div id="purchase" x-show="purchaseCredits">
    {% include 'partials/purchase_credits.html' %}
  </div>

  <section id="messages">{% include 'partials/toast.html' %}</section>
</div>
