{% extends "core/base.html" %}
{% block content %}

    <div class="text-6xl mb-6 text-[#e46aeb]">&#8617;</div>
    <h1 class="text-2xl md:text-3xl font-bold text-[#e46aeb] mb-4">
      Zahlung abgebrochen
    </h1>

    <a href="{% url 'my-account' %}"

  </div>
</div>
